name: 跨平台打包 (Mac & Windows)

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0.0）时触发 Release
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    name: 打包 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements_build.txt

      - name: 执行打包 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --windowed --onefile --name "鸣潮签到助手_Win" --add-data "wuwa_login.py;." --add-data "kuro_signin.py;." --add-data "get_game_data.py;." --collect-all PySide6 main_ui2.py

      - name: 执行打包 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS 下使用 onedir 模式并压缩，解决启动慢和 Release 上传问题
          pyinstaller --noconfirm --windowed --onedir --name "鸣潮签到助手_Mac" --add-data "wuwa_login.py:." --add-data "kuro_signin.py:." --add-data "get_game_data.py:." --collect-all PySide6 main_ui2.py
          cd dist && zip -r ../鸣潮签到助手_Mac.zip "鸣潮签到助手_Mac.app"

      - name: 上传 Release 附件
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            鸣潮签到助手_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
