name: 跨平台打包 (Mac & Windows)

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0.0）时触发 Release
  workflow_dispatch: # 允许手动点击按钮触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 强制使用 Node.js 24 避免弃用警告

jobs:
  build:
    name: 打包 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: 验证文件存在
        run: |
          ls -la
          echo "检查主文件是否存在:"
          ls -la main_ui2.py

      - name: 执行打包 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --windowed --onefile --name "鸣潮签到助手_Win" main_ui2.py
          echo "Windows 打包完成"
          ls -la dist/

      - name: 执行打包 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS 下使用 onedir 模式并压缩，解决启动慢和 Release 上传问题
          pyinstaller --noconfirm --windowed --onedir --name "鸣潮签到助手_Mac" main_ui2.py
          cd dist && zip -r ../鸣潮签到助手_Mac.zip "鸣潮签到助手_Mac.app"
          echo "macOS 打包完成"
          ls -la

      - name: 检查构建结果
        run: |
          echo "构建结果:"
          ls -la dist/ || echo "dist 目录不存在"
          ls -la *.zip || echo "zip 文件不存在"

      - name: 上传 Release 附件
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/鸣潮签到助手_Win.exe
            鸣潮签到助手_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}